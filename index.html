<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicador Automático - FCT</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], textarea, input[type="file"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Publicador Automático</h2>
    <form id="uploadForm" enctype="multipart/form-data">
        <div class="form-group">
            <label for="username">Tu Nombre (Remitente):</label>
            <input type="text" id="username" name="username" placeholder="Ej. Juan Pérez" required>
        </div>

        <div class="form-group">
            <label for="caption">Descripción del post:</label>
            <textarea id="caption" name="caption" rows="4" placeholder="Escribe aquí el pie de foto..." required></textarea>
        </div>

        <div class="form-group">
            <label for="imageFile">Selecciona la Imagen:</label>
            <input type="file" id="imageFile" name="imageFile" accept="image/*" required>
        </div>

        <div class="form-group">
            <label for="platform">Red Social Destino:</label>
            <select id="platform" name="platform">
                <option value="all">Todas las redes</option>
                <option value="facebook">Facebook</option>
                <option value="instagram">Instagram</option>
                <option value="twitter">Twitter / X</option>
            </select>
        </div>

        <button type="submit">Enviar y Publicar</button>
    </form>
    <div id="message"></div>
</div>

<script>
    const form = document.getElementById('uploadForm');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        messageDiv.style.color = 'orange';
        messageDiv.textContent = 'Enviando al flujo de n8n...';

        // URL del Webhook de n8n (La cambiaremos en el paso 2)
        const webhookUrl = 'AQUI_IRA_TU_URL_DE_N8N'; 

        const formData = new FormData(form);

        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                body: formData // Enviamos los datos como multipart/form-data
            });

            if (response.ok) {
                messageDiv.style.color = 'green';
                messageDiv.textContent = '¡Contenido enviado con éxito! Procesando publicación...';
                form.reset();
            } else {
                messageDiv.style.color = 'red';
                messageDiv.textContent = 'Error al enviar a n8n.';
            }
        } catch (error) {
            messageDiv.style.color = 'red';
            messageDiv.textContent = 'No se pudo conectar con n8n.';
        }
    });
</script>
</body>
</html>
